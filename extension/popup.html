<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 320px;
      font-family: -apple-system, sans-serif;
      background: #0F1220;
      color: #E8E9F3;
      padding: 16px;
    }
    h1 { font-size: 15px; margin: 0 0 12px; }
    h2 { font-size: 12px; margin: 20px 0 8px; color: #8B90AC; text-transform: uppercase; letter-spacing: 0.05em; }
    label {
      font-size: 11px; color: #8B90AC; text-transform: uppercase; letter-spacing: 0.05em;
      display: block; margin-top: 12px; margin-bottom: 4px;
    }
    input, select, textarea {
      width: 100%; background: #171B2E; border: 1px solid #272C46; color: #E8E9F3;
      padding: 8px 10px; border-radius: 6px; font-size: 13px; font-family: inherit;
      box-sizing: border-box;
    }
    textarea { resize: vertical; min-height: 70px; }
    button {
      margin-top: 12px; width: 100%; background: #F2A93B; color: #171200; font-weight: 600;
      border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
    }
    button.secondary { background: transparent; border: 1px solid #272C46; color: #E8E9F3; }
    #status { font-size: 12px; margin-top: 8px; color: #5EEAD4; min-height: 14px; }
    #batchLog {
      margin-top: 10px; max-height: 140px; overflow-y: auto; background: #171B2E;
      border: 1px solid #272C46; border-radius: 6px; padding: 8px; font-size: 11px;
      font-family: 'IBM Plex Mono', monospace; color: #8B90AC; display: none;
    }
    #batchLog div { margin-bottom: 4px; }
    hr { border: none; border-top: 1px solid #272C46; margin: 16px 0; }
  </style>
</head>
<body>
  <h1>⚙️ Nicho Insights</h1>

  <label for="backendUrl">URL do backend (Vercel)</label>
  <input id="backendUrl" placeholder="https://seu-projeto.vercel.app" />

  <label for="apiToken">Token da extensão</label>
  <input id="apiToken" type="password" placeholder="mesmo token do EXTENSION_API_TOKEN" />

  <label for="niche">Nicho padrão (opcional)</label>
  <input id="niche" placeholder="ex: moda feminina, fitness, marketing" />

  <button id="save">Salvar configurações</button>
  <div id="status"></div>

  <hr />

  <h2>Análise em lote</h2>
  <label for="usernames">Perfis a analisar (um @usuário por linha)</label>
  <textarea id="usernames" placeholder="perfil1&#10;perfil2&#10;perfil3"></textarea>

  <label for="interval">Intervalo entre cada perfil</label>
  <select id="interval">
    <option value="15">15 segundos</option>
    <option value="30" selected>30 segundos</option>
    <option value="60">1 minuto</option>
    <option value="120">2 minutos</option>
  </select>

  <button id="startBatch">Iniciar análise em lote</button>
  <div id="batchLog"></div>

  <script src="popup.js"></script>
</body>
</html>
